name: Windows Build (Optimizer)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: NuGet restore
        run: nuget restore Optimizer.sln -Verbosity detailed

      - name: Show MSBuild version
        run: msbuild -version

      - name: Build (Release | Any CPU)
        run: msbuild Optimizer.sln /p:Configuration=Release /p:Platform="Any CPU" /m /bl:msbuild.binlog /v:minimal

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Optimizer-Release
          path: |
            Optimizer/bin/release/**

      - name: Upload MSBuild binlog (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-binlog
          path: msbuild.binlog
